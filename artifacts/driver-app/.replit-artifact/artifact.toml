kind = "web"
previewPath = "/"
title = "Driver & Delivery App"
version = "1.0.0"
id = "artifacts/driver-app"
router = "path"
feedbackWidget = true

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18861

[services.development]
run = "pnpm --filter @workspace/driver-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/driver-app", "run", "build" ]
publicDir = "artifacts/driver-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18861"
BASE_PATH = "/"
